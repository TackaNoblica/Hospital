# PUT THIS FILE IN: backend/src/main/resources/application.properties
# Bez ovog fajla (konkretno bez careafter.jwt.*) aplikacija NE STARTUJE,
# jer JwtUtil trazi te vrednosti preko @Value.

# ---- Server ----
server.port=8081

# ---- H2 in-memory baza (najbrze za hakaton, nista ne treba instalirati) ----
spring.datasource.url=jdbc:h2:mem:careafter;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---- JWT (OBAVEZNO) ----
careafter.jwt.secret=loz1yHDGXkvKhK3rmQ7YVievA7lFG8AKzhUahsHgSqfBj0F9SQSseV9NQGAX16hm
careafter.jwt.expiration-ms=86400000

